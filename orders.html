<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Orders — Best For Pets</title>
<link rel="icon" type="image/png" href="assets/images/logo.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/logo.png"/>
<link rel="shortcut icon" type="image/x-icon" href="assets/images/logo.png"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{cherry:'#E63946','cherry-dark':'#C42B38',ink:'#23262F',cream:'#FFF6EC','cream-deep':'#FBEBDB',blush:'#FFE3D2',teal:'#0E9594',amber:'#FFB627'},fontFamily:{display:['Fraunces','serif']}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/styles.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/animations.js"></script>
<script>locationGate();</script>
</head>
<body>
<div id="app-header"></div>

<main class="pt-24 sm:pt-20 pb-24 lg:pb-12 max-w-4xl mx-auto px-4 lg:px-8">
  <h1 class="font-display font-black text-3xl lg:text-4xl text-ink mt-3">My orders 📦</h1>
  <p class="text-sm font-bold text-ink/50 mt-1.5">Every basket you've sent to your best friend.</p>

  <!-- empty -->
  <div id="empty" class="hidden text-center py-20">
    <div class="text-7xl float-slow inline-block">🐕</div>
    <h2 class="font-display font-black text-2xl text-ink mt-5">No orders yet</h2>
    <p class="text-sm font-bold text-ink/50 mt-2">Your order history will appear here. Time for a first treat run?</p>
    <a href="home.html" class="btn-shine inline-flex items-center gap-2 mt-6 bg-cherry text-white font-extrabold px-7 py-4 rounded-full hover:bg-cherry-dark transition shadow-lg shadow-cherry/30">Start shopping <i data-lucide="arrow-right" class="w-4 h-4"></i></a>
  </div>

  <div id="orders-list" class="space-y-5 mt-7"></div>
</main>

<div id="app-footer"></div>
<div id="app-bottomnav"></div>
<div id="app-whatsapp"></div>

<script>
bootShell({activeTab:'orders'});

const orders = Store.get('dittomart_orders') || [];
const activeOrder = Store.get('dittomart_active_order');

if(!orders.length){
  document.getElementById('empty').classList.remove('hidden');
}else{
  document.getElementById('orders-list').innerHTML = orders.map((o,idx)=>{
    const delivered = o.status === 'Delivered';
    const isActive = activeOrder && activeOrder.id === o.id && !delivered;
    return `<div class="reveal bg-white rounded-[2rem] border border-ink/5 p-6 shadow-sm" style="transition-delay:${Math.min(idx,5)*70}ms">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <p class="font-extrabold text-ink flex items-center gap-2">${o.id}
            ${delivered
              ? '<span class="text-[10px] font-extrabold bg-teal/10 text-teal px-2.5 py-1 rounded-full flex items-center gap-1"><i data-lucide="check-circle-2" class="w-3 h-3"></i>Delivered</span>'
              : '<span class="text-[10px] font-extrabold bg-amber/20 text-ink px-2.5 py-1 rounded-full flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-amber animate-pulse"></span>In progress</span>'}
          </p>
          <p class="text-[11px] font-bold text-ink/45 mt-1">${o.date} · ${o.time} · ${o.items.reduce((n,i)=>n+i.qty,0)} items · paid via ${o.method.toUpperCase()}</p>
        </div>
        <p class="font-display font-black text-xl text-ink">${rupee(o.total)}</p>
      </div>

      <div class="flex items-center gap-2.5 mt-4 overflow-x-auto pb-1 hide-scroll">
        ${o.items.slice(0,6).map(i=>`<img src="${i.image}" title="${i.name}" class="w-14 h-14 rounded-2xl object-cover bg-cream-deep border border-ink/5 shrink-0"/>`).join('')}
        ${o.items.length>6?`<span class="w-14 h-14 rounded-2xl bg-cream-deep grid place-items-center text-xs font-extrabold text-ink/50 shrink-0">+${o.items.length-6}</span>`:''}
      </div>
      <p class="text-xs font-bold text-ink/55 mt-2.5 truncate">${o.items.map(i=>i.name).join(' · ')}</p>

      <div class="flex flex-col sm:flex-row gap-2.5 mt-5">
        <button onclick="reorder(${idx})" class="btn-shine flex-1 bg-cherry text-white text-sm font-extrabold py-3.5 rounded-2xl hover:bg-cherry-dark active:scale-[0.98] transition flex items-center justify-center gap-2"><i data-lucide="repeat" class="w-4 h-4"></i>Reorder</button>
        ${isActive ? `<a href="tracking.html" class="flex-1 bg-ink text-cream text-sm font-extrabold py-3.5 rounded-2xl hover:bg-ink/85 transition text-center flex items-center justify-center gap-2"><i data-lucide="radar" class="w-4 h-4"></i>Track live</a>` : `<button onclick="viewOrder(${idx})" class="flex-1 bg-cream-deep text-ink text-sm font-extrabold py-3.5 rounded-2xl hover:bg-blush transition flex items-center justify-center gap-2"><i data-lucide="eye" class="w-4 h-4"></i>View details</button>`}
      </div>
    </div>`;
  }).join('');
}

function reorder(idx){
  const o = orders[idx];
  const items = Cart.items();
  o.items.forEach(i=>{
    const found = items.find(x=>x.key===i.key);
    if(found) found.qty += i.qty; else items.push({...i});
  });
  Cart.save(items);
  toast('Cart refilled from ' + o.id + ' 🛒','repeat');
  setTimeout(()=>location.href='cart.html', 700);
}
function viewOrder(idx){
  Store.set('dittomart_active_order', orders[idx]);
  location.href = 'tracking.html';
}

lucide.createIcons();
initReveal();
</script>
</body>
</html>
