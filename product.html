<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product — Best For Pets</title>
<link rel="icon" type="image/png" href="assets/images/logo.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/logo.png"/>
<link rel="shortcut icon" type="image/x-icon" href="assets/images/logo.png"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{cherry:'#E63946','cherry-dark':'#C42B38',ink:'#23262F',cream:'#FFF6EC','cream-deep':'#FBEBDB',blush:'#FFE3D2',teal:'#0E9594',amber:'#FFB627'},fontFamily:{display:['Fraunces','serif']}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/styles.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/animations.js"></script>
<script>locationGate();</script>
</head>
<body>
<div id="app-header"></div>

<main class="pt-24 sm:pt-20 pb-32 lg:pb-12 max-w-7xl mx-auto px-4 lg:px-8">
  <nav class="text-xs font-extrabold text-ink/40 mt-3 flex items-center gap-1.5">
    <a href="home.html" class="hover:text-cherry">Home</a><i data-lucide="chevron-right" class="w-3 h-3"></i>
    <a href="category.html" class="hover:text-cherry" id="crumb-cat">Shop</a><i data-lucide="chevron-right" class="w-3 h-3"></i>
    <span class="text-ink/70" id="crumb-name">Product</span>
  </nav>

  <div class="lg:grid lg:grid-cols-2 lg:gap-12 mt-5">
    <!-- gallery -->
    <div>
      <div class="relative rounded-[2rem] overflow-hidden bg-white border border-ink/5 shadow-sm aspect-square">
        <img id="main-img" src="" alt="" class="w-full h-full object-cover fade-in-up"/>
        <span id="best-badge" class="hidden absolute top-4 left-4 bg-cherry text-white text-xs font-extrabold px-3 py-1.5 rounded-full flex items-center gap-1.5"><i data-lucide="flame" class="w-3.5 h-3.5"></i><span id="orders-count"></span> ordered</span>
        <span id="off-badge" class="hidden absolute top-4 right-4 bg-amber text-ink text-xs font-extrabold px-3 py-1.5 rounded-full"></span>
      </div>
      <div class="flex gap-3 mt-4" id="thumbs"></div>
    </div>

    <!-- info -->
    <div class="mt-7 lg:mt-0">
      <div class="flex items-center gap-2" id="food-row"></div>
      <h1 class="font-display font-black text-2xl lg:text-4xl text-ink leading-tight mt-2" id="p-name"></h1>
      <div class="flex items-center gap-3 mt-3 text-sm font-bold text-ink/60">
        <span class="flex items-center gap-1 bg-teal/10 text-teal px-2.5 py-1 rounded-full text-xs"><i data-lucide="star" class="w-3.5 h-3.5 fill-teal"></i><span id="p-rating"></span></span>
        <span id="p-orders" class="text-xs"></span>
      </div>
      <div class="flex items-end gap-3 mt-5">
        <span class="font-display font-black text-3xl lg:text-4xl text-ink" id="p-price"></span>
        <span class="text-ink/40 line-through font-bold mb-1" id="p-mrp"></span>
        <span class="bg-blush text-cherry text-xs font-extrabold px-2.5 py-1 rounded-full mb-1.5" id="p-save"></span>
      </div>
      <p class="text-[11px] font-bold text-ink/45 mt-1">Inclusive of all taxes</p>

      <div class="mt-6">
        <p class="text-xs font-extrabold text-ink/50 uppercase tracking-wide mb-2.5">Choose pack size</p>
        <div class="flex flex-wrap gap-2.5" id="variant-row"></div>
      </div>

      <div class="flex items-center gap-3 mt-6">
        <div class="flex items-center gap-3 bg-white border-2 border-ink/10 rounded-full px-2 py-1.5">
          <button onclick="stepQty(-1)" class="w-9 h-9 rounded-full bg-cream-deep flex items-center justify-center active:scale-90 transition hover:bg-blush"><i data-lucide="minus" class="w-4 h-4"></i></button>
          <span id="qty" class="font-extrabold min-w-[20px] text-center">1</span>
          <button onclick="stepQty(1)" class="w-9 h-9 rounded-full bg-cream-deep flex items-center justify-center active:scale-90 transition hover:bg-blush"><i data-lucide="plus" class="w-4 h-4"></i></button>
        </div>
        <p class="text-xs font-bold text-ink/50 flex items-center gap-1.5"><i data-lucide="timer" class="w-4 h-4 text-cherry"></i>Delivery in <span class="text-cherry font-extrabold">30–45 min</span></p>
      </div>

      <div class="hidden lg:flex gap-3 mt-7">
        <button onclick="addToCart()" class="flex-1 bg-white border-2 border-cherry text-cherry font-extrabold rounded-2xl py-4 flex items-center justify-center gap-2 hover:bg-blush transition-colors active:scale-[.98]"><i data-lucide="shopping-cart" class="w-5 h-5"></i>Add to cart</button>
        <button onclick="buyNow()" class="btn-shine flex-1 bg-cherry hover:bg-cherry-dark text-white font-extrabold rounded-2xl py-4 flex items-center justify-center gap-2 transition-colors active:scale-[.98] shadow-lg shadow-cherry/30"><i data-lucide="zap" class="w-5 h-5"></i>Buy now</button>
      </div>

      <div class="bg-white rounded-3xl border border-ink/5 p-5 mt-7">
        <h3 class="font-display font-bold text-ink flex items-center gap-2"><i data-lucide="info" class="w-4 h-4 text-teal"></i>About this product</h3>
        <p class="text-sm font-semibold text-ink/65 leading-relaxed mt-2.5" id="p-desc"></p>
        <div class="grid grid-cols-3 gap-3 mt-5 text-center">
          <div class="bg-cream-deep rounded-2xl p-3"><i data-lucide="badge-check" class="w-5 h-5 text-teal mx-auto"></i><p class="text-[10px] font-extrabold text-ink/60 mt-1.5">Vet approved</p></div>
          <div class="bg-cream-deep rounded-2xl p-3"><i data-lucide="package-check" class="w-5 h-5 text-cherry mx-auto"></i><p class="text-[10px] font-extrabold text-ink/60 mt-1.5">Sealed & fresh</p></div>
          <div class="bg-cream-deep rounded-2xl p-3"><i data-lucide="rotate-ccw" class="w-5 h-5 text-amber mx-auto"></i><p class="text-[10px] font-extrabold text-ink/60 mt-1.5">Easy returns</p></div>
        </div>
      </div>
    </div>
  </div>

  <!-- frequently bought together -->
  <section class="mt-14">
    <h2 class="font-display font-black text-xl lg:text-2xl text-ink">Frequently bought together 🐾</h2>
    <div id="fbt" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 mt-5"></div>
  </section>
</main>

<!-- mobile sticky CTA -->
<div class="lg:hidden fixed bottom-16 left-0 right-0 z-40 bg-white/95 backdrop-blur border-t border-ink/10 px-4 py-3 flex gap-3">
  <button onclick="addToCart()" class="flex-1 bg-white border-2 border-cherry text-cherry font-extrabold rounded-2xl py-3.5 text-sm flex items-center justify-center gap-1.5 active:scale-[.97] transition"><i data-lucide="shopping-cart" class="w-4 h-4"></i>Add</button>
  <button onclick="buyNow()" class="flex-[1.4] bg-cherry text-white font-extrabold rounded-2xl py-3.5 text-sm flex items-center justify-center gap-1.5 active:scale-[.97] transition shadow-lg shadow-cherry/30"><i data-lucide="zap" class="w-4 h-4"></i>Buy now · <span id="cta-price"></span></button>
</div>

<div id="app-footer"></div>
<div id="app-bottomnav"></div>
<div id="app-whatsapp"></div>

<script>
  bootShell({ activeTab: "categories" });

  const id = new URLSearchParams(location.search).get("id") || "BFP-001";
  const p = getProduct(id) || PRODUCTS[0];
  const cat = getCategory(p.cat);
  let selVariant = p.variants.find(v => v.price === p.price) || p.variants[0];
  let qty = 1;

  document.title = p.name + " — Best For Pets";
  document.getElementById("crumb-cat").textContent = cat.name;
  document.getElementById("crumb-cat").href = "category.html?cat=" + cat.slug;
  document.getElementById("crumb-name").textContent = p.name;
  document.getElementById("p-name").textContent = p.name;
  document.getElementById("p-rating").textContent = p.rating;
  document.getElementById("p-orders").innerHTML = `🔥 Ordered <b class="text-ink">${p.orders}</b> times`;
  document.getElementById("p-desc").textContent = p.desc;
  document.getElementById("food-row").innerHTML = p.edible ? foodDot(p, "lg") + `<span class="text-xs font-extrabold text-ink/50 capitalize">${p.foodType.replace("-", " ")}</span>` : `<span class="text-xs font-extrabold text-teal bg-teal/10 px-2.5 py-1 rounded-full">${cat.name}</span>`;
  if (p.bestseller) { document.getElementById("best-badge").classList.remove("hidden"); document.getElementById("best-badge").classList.add("flex"); document.getElementById("orders-count").textContent = p.orders + "+"; }

  /* gallery — main image + tinted thumbs */
  const gallery = [p.img, p.img + "&sat=-30", p.img + "&blur=0"];
  document.getElementById("main-img").src = gallery[0];
  document.getElementById("thumbs").innerHTML = gallery.map((g, i) => `
    <button onclick="setImg(${i}, this)" class="thumb w-18 h-18 w-20 h-20 rounded-2xl overflow-hidden border-2 ${i === 0 ? "border-cherry" : "border-transparent"} transition-all hover:scale-105 active:scale-95">
      <img src="${g}" class="w-full h-full object-cover" alt="view ${i + 1}"/>
    </button>`).join("");
  function setImg(i, btn) {
    const m = document.getElementById("main-img");
    m.classList.remove("fade-in-up"); void m.offsetWidth;
    m.src = gallery[i]; m.classList.add("fade-in-up");
    document.querySelectorAll(".thumb").forEach(t => t.classList.replace("border-cherry", "border-transparent"));
    btn.classList.replace("border-transparent", "border-cherry");
  }

  function renderVariants() {
    document.getElementById("variant-row").innerHTML = p.variants.map(v => `
      <button onclick='selectVariant(${JSON.stringify(v)})' class="px-4 py-2.5 rounded-2xl border-2 text-sm font-extrabold transition-all active:scale-95 ${v.label === selVariant.label ? "bg-cherry border-cherry text-white shadow-lg shadow-cherry/25" : "bg-white border-ink/10 text-ink/70 hover:border-cherry/50"}">
        ${v.label}<span class="block text-[10px] font-bold ${v.label === selVariant.label ? "text-white/80" : "text-ink/40"}">${rupee(v.price)}</span>
      </button>`).join("");
    updatePrice();
  }
  function selectVariant(v) { selVariant = v; renderVariants(); }
  function updatePrice() {
    const off = Math.round((1 - selVariant.price / (selVariant.mrp || p.mrp)) * 100);
    document.getElementById("p-price").textContent = rupee(selVariant.price * qty);
    document.getElementById("p-mrp").textContent = rupee((selVariant.mrp || p.mrp) * qty);
    document.getElementById("p-save").textContent = off > 0 ? `Save ${off}%` : "Best price";
    document.getElementById("cta-price").textContent = rupee(selVariant.price * qty);
    const ob = document.getElementById("off-badge");
    if (off > 0) { ob.textContent = off + "% OFF"; ob.classList.remove("hidden"); }
  }
  function stepQty(d) { qty = Math.max(1, Math.min(10, qty + d)); document.getElementById("qty").textContent = qty; updatePrice(); }
  function addToCart() { Cart.add(p.id, selVariant.label, qty); }
  function buyNow() { Cart.add(p.id, selVariant.label, qty); window.location.href = "cart.html"; }

  /* frequently bought together */
  const fbtIds = (FREQUENTLY_TOGETHER[p.cat] || []).filter(x => x !== p.id);
  const extra = PRODUCTS.filter(x => x.cat === p.cat && x.id !== p.id && !fbtIds.includes(x.id)).slice(0, 2).map(x => x.id);
  document.getElementById("fbt").innerHTML = [...fbtIds, ...extra].slice(0, 5).map(fid => getProduct(fid)).filter(Boolean).map((fp, i) => productCard(fp, i * 60)).join("");

  renderVariants();
  lucide.createIcons();
  initReveal();
</script>
</body>
</html>
